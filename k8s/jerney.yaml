# ==============================================================
# Jerney Blog Platform - Kubernetes Manifest (Fixed / Production Ready)
# Includes: Namespace, Secrets, PVC, DB, Backend, Frontend
# ==============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: jerney

# ==============================================================
# SECRET
# ==============================================================

---
apiVersion: v1
kind: Secret
metadata:
  name: jerney-db-secret
  namespace: jerney
type: Opaque
data:
  POSTGRES_USER: amVybmV5X3VzZXI=
  POSTGRES_PASSWORD: amVybmV5X3Bhc3NfMjAyNg==
  POSTGRES_DB: amVybmV5X2Ri

# ==============================================================
# STORAGECLASS
# ==============================================================

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: jerney-ebs-sc
provisioner: ebs.csi.eks.amazonaws.com
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

# ==============================================================
# PVC
# ==============================================================

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jerney-db-pvc
  namespace: jerney
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: jerney-ebs-sc
  resources:
    requests:
      storage: 10Gi

# ==============================================================
# DATABASE DEPLOYMENT
# ==============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-db
  namespace: jerney
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jerney-db
  template:
    metadata:
      labels:
        app: jerney-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                name: jerney-db-secret

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - jerney_user
                - -d
                - jerney_db
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - jerney_user
                - -d
                - jerney_db
            initialDelaySeconds: 20
            periodSeconds: 10

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jerney-db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: jerney-db
  namespace: jerney
spec:
  selector:
    app: jerney-db
  ports:
    - port: 5432
      targetPort: 5432

# ==============================================================
# BACKEND DEPLOYMENT
# ==============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-backend
  namespace: jerney
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jerney-backend

  template:
    metadata:
      labels:
        app: jerney-backend

    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z jerney-db 5432; do
                echo "waiting for db..."
                sleep 3
              done

      containers:
        - name: backend

          # ✅ FIXED IMAGE NAME
          image: shreenandbandre/jerney-backend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          env:
            - name: PORT
              value: "5000"

            - name: DB_HOST
              value: jerney-db

            - name: DB_PORT
              value: "5432"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: jerney-db-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jerney-db-secret
                  key: POSTGRES_PASSWORD

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: jerney-db-secret
                  key: POSTGRES_DB

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: jerney-backend
  namespace: jerney
spec:
  selector:
    app: jerney-backend
  ports:
    - port: 5000
      targetPort: 5000

# ==============================================================
# FRONTEND DEPLOYMENT
# ==============================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-frontend
  namespace: jerney
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jerney-frontend

  template:
    metadata:
      labels:
        app: jerney-frontend

    spec:
      containers:
        - name: frontend

          # ✅ FIXED IMAGE NAME
          image: shreenandbandre/jerney-frontend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: jerney-frontend
  namespace: jerney
spec:
  type: NodePort
  selector:
    app: jerney-frontend
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080

# ==============================================================
# NETWORK POLICY
# ==============================================================

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-db
  namespace: jerney
spec:
  podSelector:
    matchLabels:
      app: jerney-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: jerney-backend
      ports:
        - protocol: TCP
          port: 5432